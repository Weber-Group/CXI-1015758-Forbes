#### Config file. Used all over the place
#### Note: the indentation guideline for yaml files is 2 spaces. Not the tab character or 4 spaces. You can set the preference used by Jupyterlab in the bottom right hand corner of the text editor.

# Change EXPERIMENT when initializing a new repo for an experiment. Three places to change this.
expNumber: cxi101575826 # Enter the full run number here, e.g. cxil1037623.
expDir: /sdf/data/lcls/ds/cxi/cxi101575826/ # Full path to the experimental directory here e.g/ /sdf/data/lcls/ds/cxi/cxil1037623/.

# This is not used anywhere. But is useful for debugging and version control.
template_version: v1.1.1
xrst_version: v1.0.0-beta.0 - v1.0.1

## Run specific information
data_paths:
- runs: [0, .inf]   # Add the range of runs that this path applies for. yaml parses .inf to float('inf') in python.
  path: /sdf/data/lcls/ds/cxi/cxi101575826/hdf5/smalldata/

# Photon energy
photon_energy:
- runs: [0, .inf]
  energy: 9.8   # in keV
# Pump pulse energy, in uJ
pump_energy:
- runs: [0, .inf]
  energy: 0.2 # in uJ
# Sample types
samples:
- runs: [57, 57]
  sample: 'Dark'
- runs: [59, 59]
  sample: 'Background'
- runs: [60, 60]
  sample: 'Background'
- runs: [61, 61]
  sample: 'Ne'
- runs: [62, 62]
  sample: 'SF6'
- runs: [71, 71]
  sample: "Dark"
- runs: [76, 76]
  sample: 'Background'
- runs: [77, 77]
  sample: 'Ne'
- runs: [78, 79]
  sample: 'SF6'
- runs: [80, 88]
  sample: 'Ar'
- runs: [89, 104]
  sample: 'Xe'
- runs: [105, 109]
  sample:  'DMP'
- runs: [110, 111]
  sample:  'Ar'
# Timetool calibration data
tt_calibration:
- runs: [79, .inf]
  slope: -7.880086004985277e-16
  intercept: 2.4399699326624606e-13
